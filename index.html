<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Have You Fallen for Vee Yet, Dchinh? 💓</title>

  <style>
    body {
      background: linear-gradient(to bottom, #ffd6e0, #ffe6eb);
      text-align: center;
      font-family: "Comic Sans MS", cursive;
      margin: 0;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    h1 {
      margin-top: 80px;
      font-size: 36px;
      color: #ff4d6d;
    }

    img {
      margin-top: 20px;
      width: 180px;
      border-radius: 12px;
    }

    button {
      padding: 14px 30px;
      font-size: 18px;
      margin: 15px;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: 0.2s;
      box-shadow: 0 8px 18px rgba(0,0,0,0.12);
    }

    #yesBtn {
      background: #4CAF50;
      color: white;
    }

    #noBtn {
      background: #ff4d4d;
      color: white;
      position: absolute;
      left: 55%;
      top: 65%;
    }

    .heart {
      position: absolute;
      color: #ff4d6d;
      animation: float 4s linear infinite;
      pointer-events: none;
    }

    @keyframes float {
      0% {
        transform: translateY(0);
        opacity: 1;
      }
      100% {
        transform: translateY(-100vh);
        opacity: 0;
      }
    }
  </style>
</head>
<body>

  <h1>Have You Fallen for Vee Yet, Dchinh? 💓</h1>

  <img src="https://media.tenor.com/x8v1oNUOmg4AAAAC/cute-love.gif" alt="cute gif">

  <br>

  <button id="yesBtn">Yes 😍</button>
  <button id="noBtn">No 😢</button>

  <audio id="bgMusic" loop>
    <source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_5b0c6c9d8b.mp3?filename=love-ambient-11058.mp3" type="audio/mpeg">
  </audio>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const music = document.getElementById("bgMusic");

    let musicStarted = false;

    function startMusic() {
      if (!musicStarted) {
        music.play().then(() => {
          musicStarted = true;
        }).catch(() => {});
      }
    }

    document.addEventListener("click", startMusic);
    document.addEventListener("touchstart", startMusic);

    let messages = [
      "Are you sure? 🥺",
      "Really sure? 😢",
      "Think again 💭",
      "Don’t do this 💔",
      "Pleaseeee 😭",
      "Last chance 😳"
    ];

    let index = 0;
    let noSize = 18;
    let yesSize = 18;

    noBtn.addEventListener("mouseover", () => {
      noBtn.innerText = messages[index % messages.length];
      index++;

      noSize = Math.max(noSize - 1, 10);
      noBtn.style.fontSize = noSize + "px";

      yesSize += 4;
      yesBtn.style.fontSize = yesSize + "px";
      yesBtn.style.padding = (14 + index * 1.5) + "px " + (30 + index * 2) + "px";

      const maxX = window.innerWidth - noBtn.offsetWidth - 20;
      const maxY = window.innerHeight - noBtn.offsetHeight - 20;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    yesBtn.addEventListener("click", () => {
      startMusic();

      document.body.innerHTML = `
        <h1 style="margin-top: 120px; font-size: 52px; color: #ff4d6d;">
          I KNEW IT 😍💖
        </h1>
      `;

      createHearts();
    });

    function createHearts() {
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.top = Math.random() * 100 + "vh";
        heart.style.fontSize = (Math.random() * 20 + 18) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
          heart.remove();
        }, 4000);
      }, 180);
    }
  </script>

</body>
</html>
