<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const card = document.getElementById("card");
const container = document.querySelector(".button-wrap");

const noMessages = [
  "Are you sure?",
  "Really sure?",
  "That seems unlikely.",
  "Try that again."
];

let index = 0;
let scale = 1;

function moveNo() {
  if (index < noMessages.length) {
    noBtn.innerText = noMessages[index];
  } else {
    noBtn.innerText = noMessages[noMessages.length - 1];
  }

  index++;

  const maxX = container.clientWidth - noBtn.offsetWidth;
  const maxY = container.clientHeight - noBtn.offsetHeight;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";

  scale += 0.12;
  yesBtn.style.transform = `scale(${scale})`;
}

noBtn.addEventListener("mouseover", moveNo);
noBtn.addEventListener("click", (e) => {
  e.preventDefault();
  moveNo();
});

yesBtn.addEventListener("click", () => {
  card.innerHTML = `
    <h1 style="font-size:60px;">I knew it.</h1>
    <p>Took you long enough.</p>
    <a class="music-link" href="https://www.youtube.com/watch?v=GxldQ9eX2wo" target="_blank">
      Play the song
    </a>
  `;

  setInterval(() => {
    const el = document.createElement("div");
    el.className = "floating";
    el.innerText = ["♡","✦","✧"][Math.floor(Math.random() * 3)];
    el.style.left = Math.random() * 100 + "vw";
    el.style.fontSize = "20px";
    document.body.appendChild(el);

    setTimeout(() => el.remove(), 4000);
  }, 200);
});
</script>
