<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Have You Fallen for Vee Yet, Dchinh? 💓</title>

<style>
body {
    background: linear-gradient(to bottom, #ffd6e0, #ffe6eb);
    text-align: center;
    font-family: "Comic Sans MS", cursive;
    margin: 0;
    height: 100vh;
    overflow: hidden;
}

h1 {
    margin-top: 80px;
    font-size: 36px;
    color: #ff4d6d;
}

button {
    padding: 14px 30px;
    font-size: 18px;
    margin: 15px;
    border: none;
    border-radius: 14px;
    cursor: pointer;
    transition: 0.3s;
}

#yesBtn {
    background: #4CAF50;
    color: white;
}

#noBtn {
    background: #ff4d6d;
    color: white;
    position: absolute;
}

.heart {
    position: absolute;
    color: #ff4d6d;
    animation: float 4s linear infinite;
}

@keyframes float {
    0% { transform: translateY(0); opacity: 1; }
    100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Have You Fallen for Vee Yet, Dchinh? 💓</h1>

<button id="yesBtn">Yes 😍</button>
<button id="noBtn">No 😢</button>

<!-- 🎵 NHẠC -->
<audio id="bgMusic" src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const music = document.getElementById("bgMusic");

// chạy nhạc khi click bất kỳ đâu
document.body.addEventListener("click", () => {
    music.play();
}, { once: true });

// nút No chạy trốn
noBtn.addEventListener("mouseover", () => {
    noBtn.style.top = Math.random() * 80 + "vh";
    noBtn.style.left = Math.random() * 80 + "vw";
});

// khi bấm Yes
yesBtn.addEventListener("click", () => {
    document.body.innerHTML = `
    <h1 style="margin-top:120px; font-size:52px; color:#ff4d6d;">
        I KNEW IT 😍💖
    </h1>
    `;
    createHearts();
});

// tạo tim bay
function createHearts() {
    setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "💖";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.fontSize = (Math.random() * 20 + 18) + "px";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 4000);
    }, 200);
}
</script>

</body>
</html>
