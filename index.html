<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have you fallen for Vee yet, Dchinh?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f7f4ef;
      font-family: "Inter", sans-serif;
    }

    .card {
      text-align: center;
    }

    button {
      margin: 10px;
      padding: 12px 24px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
    }

    #yesBtn {
      background: black;
      color: white;
    }

    #noBtn {
      position: absolute;
      background: #ddd;
    }
  </style>
</head>
<body>

<div class="card" id="card">
  <h1>Have you fallen for Vee yet, Dchinh?</h1>
  <button id="yesBtn">Okay... maybe</button>
  <button id="noBtn">No</button>
</div>

<!-- YOUTUBE ẨN -->
<div id="player" style="display:none;"></div>

<script src="https://www.youtube.com/iframe_api"></script>

<script>
let player;
let musicStarted = false;

// Load YouTube player
function onYouTubeIframeAPIReady() {
  player = new YT.Player("player", {
    height: "1",
    width: "1",
    videoId: "GxldQ9eX2wo", // Until I Found You
    playerVars: {
      autoplay: 0,
      controls: 0,
      mute: 0
    }
  });
}

// CLICK BẤT KỲ → PHÁT NHẠC
document.addEventListener("click", () => {
  if (!musicStarted && player) {
    player.playVideo();
    musicStarted = true;
  }
}, { once: true });

// NO chạy
const noBtn = document.getElementById("noBtn");
const yesBtn = document.getElementById("yesBtn");

noBtn.addEventListener("mouseover", () => {
  noBtn.style.top = Math.random() * window.innerHeight + "px";
  noBtn.style.left = Math.random() * window.innerWidth + "px";

  yesBtn.style.transform = "scale(1.2)";
});

// YES
yesBtn.addEventListener("click", () => {
  document.getElementById("card").innerHTML = `
    <h1>I knew it.</h1>
  `;
});
</script>

</body>
</html>
