<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Have you fallen for Vee yet, Dchinh?</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --bg-1: #f7f4ef;
      --bg-2: #ece6dd;
      --card: rgba(255, 255, 255, 0.60);
      --text-main: #1f1d1a;
      --text-soft: #6e675f;
      --accent: #8b7355;
      --accent-dark: #6f5d47;
      --line: rgba(60, 52, 43, 0.12);
      --shadow: 0 20px 50px rgba(74, 61, 48, 0.12);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      overflow: hidden;
      color: var(--text-main);
      font-family: "Inter", sans-serif;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.9), transparent 30%),
        radial-gradient(circle at bottom right, rgba(212, 196, 177, 0.55), transparent 25%),
        linear-gradient(135deg, var(--bg-1), var(--bg-2));
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    .grain {
      position: absolute;
      inset: 0;
      opacity: 0.05;
      pointer-events: none;
      background-image:
        linear-gradient(0deg, transparent 24%, rgba(0,0,0,.04) 25%, rgba(0,0,0,.04) 26%, transparent 27%, transparent 74%, rgba(0,0,0,.04) 75%, rgba(0,0,0,.04) 76%, transparent 77%, transparent),
        linear-gradient(90deg, transparent 24%, rgba(0,0,0,.04) 25%, rgba(0,0,0,.04) 26%, transparent 27%, transparent 74%, rgba(0,0,0,.04) 75%, rgba(0,0,0,.04) 76%, transparent 77%, transparent);
      background-size: 14px 14px;
    }

    .card {
      width: min(720px, 100%);
      padding: 56px 40px 80px;
      border: 1px solid var(--line);
      border-radius: 32px;
      background: var(--card);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      box-shadow: var(--shadow);
      text-align: center;
      position: relative;
      z-index: 2;
    }

    .eyebrow {
      display: inline-block;
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
      color: var(--text-soft);
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-family: "Cormorant Garamond", serif;
      font-weight: 600;
      font-size: clamp(42px, 6vw, 72px);
      line-height: 0.98;
      letter-spacing: -0.02em;
    }

    .sub {
      margin: 18px auto 0;
      max-width: 520px;
      font-size: 15px;
      line-height: 1.7;
      color: var(--text-soft);
    }

    .divider {
      width: 92px;
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(80, 68, 53, 0.35), transparent);
      margin: 28px auto 34px;
    }

    .button-wrap {
      position: relative;
      width: 100%;
      height: 250px;
      margin-top: 12px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      gap: 18px;
    }

    button {
      border: none;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.25s ease, box-shadow 0.25s ease, background 0.25s ease, color 0.25s ease;
      font-family: "Inter", sans-serif;
      font-weight: 500;
      letter-spacing: 0.01em;
      box-shadow: 0 10px 24px rgba(45, 39, 32, 0.08);
      white-space: nowrap;
    }

    #yesBtn {
      font-size: 16px;
      padding: 16px 34px;
      background: #1f1d1a;
      color: #f8f5ef;
      position: relative;
      z-index: 2;
    }

    #yesBtn:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 30px rgba(25, 22, 19, 0.16);
      background: #141311;
    }

    #noBtn {
      font-size: 15px;
      padding: 15px 28px;
      background: #ede7df;
      color: #4f473f;
      border: 1px solid rgba(79, 71, 63, 0.08);
      position: absolute;
      left: calc(50% + 110px);
      top: 0;
      z-index: 3;
    }

    #noBtn:hover {
      background: #e5ddd3;
    }

    .note {
      margin-top: 8px;
      font-size: 12px;
      color: #8a8178;
      letter-spacing: 0.03em;
    }

    .floating {
      position: absolute;
      pointer-events: none;
      font-size: 18px;
      color: rgba(139, 115, 85, 0.22);
      animation: driftUp 4.8s linear forwards;
    }

    @keyframes driftUp {
      0% {
        opacity: 0;
        transform: translateY(18px) scale(0.9);
      }
      12% {
        opacity: 1;
      }
      100% {
        opacity: 0;
        transform: translateY(-140px) scale(1.15);
      }
    }

    .final-screen {
      text-align: center;
      animation: fadeIn 0.6s ease;
    }

    .final-screen h1 {
      font-size: clamp(48px, 8vw, 96px);
      margin-bottom: 12px;
    }

    .final-screen p {
      margin: 0;
      font-size: 16px;
      color: var(--text-soft);
      letter-spacing: 0.03em;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(8px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    #yt-player-wrap {
      position: fixed;
      width: 1px;
      height: 1px;
      left: -9999px;
      top: -9999px;
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 640px) {
      .card {
        padding: 42px 22px 70px;
        border-radius: 24px;
      }

      .button-wrap {
        height: 280px;
      }

      #yesBtn {
        padding: 15px 28px;
      }

      #noBtn {
        left: calc(50% + 70px);
      }
    }
  </style>
</head>
<body>
  <div class="grain"></div>

  <main class="card" id="card">
    <div class="eyebrow">A small question</div>
    <h1>Have you fallen for Vee yet, Dchinh?</h1>
    <div class="divider"></div>
    <p class="sub">
      You can be honest. I made this very simple on purpose.
    </p>

    <div class="button-wrap" id="buttonWrap">
      <button id="yesBtn">Yes, maybe I have</button>
      <button id="noBtn">No, not yet</button>
    </div>

    <div class="note">Choose carefully.</div>
  </main>

  <div id="yt-player-wrap">
    <div id="player"></div>
  </div>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const card = document.getElementById("card");

    const noMessages = [
      "Are you sure?",
      "Really sure?",
      "Think again.",
      "Take your time."
    ];

    let noIndex = 0;
    let yesScale = 1;
    let player;
    let playerReady = false;
    let musicStarted = false;

    function onYouTubeIframeAPIReady() {
      player = new YT.Player("player", {
        height: "1",
        width: "1",
        videoId: "GxldQ9eX2wo",
        playerVars: {
          autoplay: 0,
          controls: 0,
          disablekb: 1,
          fs: 0,
          modestbranding: 1,
          playsinline: 1,
          rel: 0,
          start: 0
        },
        events: {
          onReady: function () {
            playerReady = true;
          }
        }
      });
    }

    function startMusic() {
      if (playerReady && !musicStarted) {
        player.playVideo();
        musicStarted = true;
      }
    }

    window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;

    document.addEventListener("click", startMusic, { once: true });

    function moveNoButton() {
      if (noIndex < noMessages.length) {
        noBtn.textContent = noMessages[noIndex];
      } else {
        noBtn.textContent = noMessages[noMessages.length - 1];
      }
      noIndex++;

      const padding = 20;
      const maxX = window.innerWidth - noBtn.offsetWidth - padding * 2;
      const maxY = window.innerHeight - noBtn.offsetHeight - padding * 2;

      const x = Math.random() * Math.max(140, maxX);
      const y = 110 + Math.random() * Math.max(140, maxY - 180);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";

      yesScale += 0.045;
      yesBtn.style.transform = `scale(${yesScale})`;
    }

    noBtn.addEventListener("mouseenter", () => {
      startMusic();
      moveNoButton();
    });

    noBtn.addEventListener("click", (e) => {
      e.preventDefault();
      startMusic();
      moveNoButton();
    });

    yesBtn.addEventListener("click", () => {
      startMusic();
      card.innerHTML = `
        <div class="final-screen">
          <div class="eyebrow">I thought so</div>
          <h1>I knew it.</h1>
          <p>That was the right answer.</p>
        </div>
      `;
      createFloating();
    });

    function createFloating() {
      const symbols = ["✦", "♡", "✷", "☾", "✧"];
      setInterval(() => {
        const el = document.createElement("div");
        el.className = "floating";
        el.textContent = symbols[Math.floor(Math.random() * symbols.length)];
        el.style.left = Math.random() * 100 + "vw";
        el.style.top = 70 + Math.random() * 25 + "vh";
        el.style.fontSize = (14 + Math.random() * 18) + "px";
        document.body.appendChild(el);

        setTimeout(() => {
          el.remove();
        }, 4800);
      }, 220);
    }
  </script>
</body>
</html>
